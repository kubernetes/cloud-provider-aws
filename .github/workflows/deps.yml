name: "Dependency Review"
on:
  push:
    branches:
      - master
      - 'release-*'
  pull_request:
  workflow_dispatch:
    inputs:
      head_ref:
        description: 'HEAD git reference (tag/branch/commit) to analyze'
        required: true
        default: 'master'
        type: string
      base_ref:
        description: 'Base git reference (tag/branch/commit) to compare against head_ref'
        required: true
        default: 'master'
        type: string
permissions:
  contents: read
jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          show-progress: false
      - name: "Dependency Review"
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ inputs.base_ref || github.event.pull_request.base.sha || 'master' }}
          head-ref: ${{ inputs.head_ref || github.event.pull_request.head.sha || github.ref }}
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          show-progress: false
      - id: govulncheck
        uses: golang/govulncheck-action@3fa7bd9cee2cfdf3499a8803b226e43de7b7cdb4 # master (post-v1.0.4 with pinned deps)
        with:
          go-version-file: go.mod
      - id: govulncheck-tests-e2e
        uses: golang/govulncheck-action@3fa7bd9cee2cfdf3499a8803b226e43de7b7cdb4 # master (post-v1.0.4 with pinned deps)
        with:
          go-version-file: tests/e2e/go.mod
  gomod-match-check:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          show-progress: false
      - name: "All go.mod go directive must use version major.minor.patch that matches GOLANG_DIRECTIVE_VERSION"
        run: |
          make verify-go-directive
